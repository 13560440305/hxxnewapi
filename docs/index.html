<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>星游开放平台 - 文档</title>
  <script>
    (function () {
      function resolveDocsLang() {
        try {
          var lang = localStorage.getItem('i18nextLng') || 'zh-CN';
          if (lang === 'en') return 'en';
          return 'cn';
        } catch (e) {
          return 'cn';
        }
      }
      var target = '/docs/' + resolveDocsLang() + '/';
      if (location.hash) target += location.hash;
      location.replace(target);
    })();
  </script>
</head>
<body>
  <p>正在跳转文档…</p>
</body>
</html>
