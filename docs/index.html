<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>星游开放平台 - 文档</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 720px; margin: 80px auto; padding: 0 20px; }
    h1 { font-size: 1.6rem; margin: 0 0 12px; }
    p { color: #666; line-height: 1.6; }
    .btns { margin-top: 18px; display: flex; gap: 12px; flex-wrap: wrap; }
    a.btn { display: inline-block; padding: 10px 14px; border: 1px solid #e0e0e0; border-radius: 8px; text-decoration: none; color: #111; }
    a.btn:hover { border-color: #42b983; background: #f8fffe; }
    code { background: #f6f8fa; padding: 2px 6px; border-radius: 6px; }
  </style>
</head>
<body>
  <h1>星游开放平台 - 文档</h1>
  <p>选择语言 / Select language</p>
  <div class="btns">
    <a id="link-cn" class="btn" href="#">中文</a>
    <a id="link-en" class="btn" href="#">English（预留）</a>
  </div>
  <p id="local-tip" style="display:none;margin-top:18px;">
    本地调试请运行：<code>docsify serve docs/cn</code>（中文）或 <code>docsify serve docs/en</code>（英文占位），然后访问启动后提示的地址（通常是 <code>http://localhost:3000/</code>）。
  </p>
  <script>
    (function () {
      var isLocal = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
      var base = isLocal ? '' : '/hxxnewapi';
      document.getElementById('link-cn').href = base + '/cn/';
      document.getElementById('link-en').href = base + '/en/';
      if (isLocal) document.getElementById('local-tip').style.display = 'block';
    })();
  </script>
</body>
</html>
