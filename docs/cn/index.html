<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>星游开放平台 - 文档</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" />
</head>
<body>
  <div id="app">加载中…</div>
  <script>
    (function () {
      var isLocal = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
      window.$docsify = {
        name: '星游开放平台 文档',
        // 兼容两种本地调试方式：
        // 1) docsify serve docs/cn        -> 访问 http://localhost:3000/     （basePath=/）
        // 2) npx http-server docs -p 3000 -> 访问 http://localhost:3000/cn/  （basePath=/cn/）
        basePath: isLocal ? (location.pathname.indexOf('/cn/') === 0 ? '/cn/' : '/') : '/hxxnewapi/cn/',
        // GitHub Pages 不支持 history 路由的回退（深层路径会 404），因此线上用 hash；
        // 本地若想去掉 /#/，可使用 history（但需要服务器支持 SPA fallback）。
        routerMode: isLocal ? 'history' : 'hash',
        loadSidebar: 'sidebar.md',
        subMaxLevel: 0,
        auto2top: true,
        homepage: '产品介绍.md',
        search: 'auto',
        formatUpdated: '{YYYY}-{MM}-{DD} {HH}:{mm}',
        copyCode: true,
      };
    })();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-tabs@1"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
</body>
</html>
