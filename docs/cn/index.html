<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>星游开放平台 - 文档</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-sidebar-collapse@1.3.5/dist/sidebar.min.css" />
  <style>
    /* 左侧导航只保留 2 级，第 3 级为页面内导航，不在左侧显示 */
    .sidebar .sidebar-nav ul ul ul {
      display: none !important;
    }
  </style>
</head>
<body>
  <div id="app">加载中…</div>
  <script>
    (function () {
      var isLocal = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
      // 纠正错误 pathname：点击侧栏后 pathname 变成 /cn/API导航、/API导航 等，导致 basePath 错、sidebar 404、一直「加载中」。统一回退到 /cn/ 或 / 并保留 hash。
      var path = location.pathname.replace(/\/$/, '');
      if (path && path !== '/' && path !== '/cn' && path !== '/hxxnewapi' && path !== '/hxxnewapi/cn') {
        var base = (path.indexOf('/cn/') === 0 || path === '/cn' || path.indexOf('/hxxnewapi/cn/') === 0 || path === '/hxxnewapi/cn') ? (isLocal ? '/cn/' : '/cn/') : (isLocal ? '/' : '/');
        location.replace(location.origin + base + (location.hash || '#/'));
        return;
      }
      window.$docsify = {
        name: '星游开放平台 文档',
        // 兼容两种本地调试方式：
        // 1) docsify serve docs/cn        -> 访问 http://localhost:3000/     （basePath=/）
        // 2) npx http-server docs -p 3000 -> 访问 http://localhost:3000/cn/  （basePath=/cn/）
        basePath: isLocal ? (location.pathname.indexOf('/cn/') === 0 ? '/cn/' : '/') : '/cn/',
        // 统一使用 hash 路由，避免进入子路径（如 音频/文本转语音）后侧栏请求 音频/sidebar.md 导致 404、侧栏一直「加载中」
        routerMode: 'hash',
        loadSidebar: 'sidebar.md',
        subMaxLevel: 2,
        sidebarDisplayLevel: 0,
        auto2top: true,
        homepage: '产品介绍.md',
        search: 'auto',
        formatUpdated: '{YYYY}-{MM}-{DD} {HH}:{mm}',
        copyCode: true,
      };
    })();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-tabs@1"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-sidebar-collapse@1.3.5/dist/docsify-sidebar-collapse.min.js"></script>
</body>
</html>
